name: event_hup
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  bloc: ^9.2.1
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.1.1
  cupertino_icons: ^1.0.8
  email_validator: ^3.0.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_getit: ^3.0.1
  flutter_launcher_icons: ^0.14.4
  flutter_localization: ^0.4.0
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.3.0
  flutter_native_splash: ^2.4.7
  flutter_screenutil: ^5.9.3
  flutter_secure_storage: ^10.3.1
  flutter_svg: ^2.3.0
  get_it: ^7.7.0
  go_router: ^17.3.0
  intl: ^0.20.2
  latlong2: ^0.9.1
  shared_preferences: ^2.5.5
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  skeletonizer: ^2.1.3
  retrofit: ^4.9.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  equatable: ^2.0.8
  sqflite: ^2.3.3
  path: ^1.9.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.2
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  build_runner: ^2.15.0
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  retrofit_generator: ^10.2.6

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/png/
  fonts:
    - family: AirbnbCereal
      fonts:
        - asset: assets/fonts/airbnb_cereal_app/AirbnbCereal_W_Lt.otf
          weight: 300
        - asset: assets/fonts/airbnb_cereal_app/AirbnbCereal_W_Bk.otf
          weight: 400
        - asset: assets/fonts/airbnb_cereal_app/AirbnbCereal_W_Md.otf
          weight: 500
        - asset: assets/fonts/airbnb_cereal_app/AirbnbCereal_W_Bd.otf
          weight: 700
        - asset: assets/fonts/airbnb_cereal_app/AirbnbCereal_W_XBd.otf
          weight: 800
        - asset: assets/fonts/airbnb_cereal_app/AirbnbCereal_W_Blk.otf
          weight: 900

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/png/logo.png"
  background_color: "#FFFFFF"

flutter_intl:
  enabled: true
flutter_assets:
  assets_path: assets/images/
  output_path: lib/core/helpers/
  filename: app_assets.dart
  field_prefix: null
