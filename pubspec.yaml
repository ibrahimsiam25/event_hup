name: event_hup
description: "A new Flutter project."

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_localization: ^0.4.0
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.3.0
  go_router: ^17.3.0
  intl: ^0.20.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/png/
  fonts:
    - family: AirbnbCereal
      fonts:
        - asset: assets/fonts/airbnb_cereal_app/AirbnbCereal_W_Lt.otf
          weight: 300
        - asset: assets/fonts/airbnb_cereal_app/AirbnbCereal_W_Bk.otf
          weight: 400  
        - asset: assets/fonts/airbnb_cereal_app/AirbnbCereal_W_Md.otf
          weight: 500
        - asset: assets/fonts/airbnb_cereal_app/AirbnbCereal_W_Bd.otf
          weight: 700
        - asset: assets/fonts/airbnb_cereal_app/AirbnbCereal_W_XBd.otf
          weight: 800
        - asset: assets/fonts/airbnb_cereal_app/AirbnbCereal_W_Blk.otf
          weight: 900

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/png/app_icon.png"

flutter_intl:
  enabled: true
flutter_assets:
  assets_path: assets/images/
  output_path: lib/core/helpers/
  filename: app_assets.dart
  field_prefix: null
